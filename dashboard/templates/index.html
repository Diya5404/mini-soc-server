{% extends "layout.html" %}

{% block title %}Overview{% endblock %}
{% block header %}SOC Analytics Overview{% endblock %}

{% block content %}
<section class="overview-panels">
    <div class="panel">
        <h3>Total Events</h3>
        <p id="total-events" class="counter">0</p>
    </div>
    <div class="panel">
        <h3>Total Alerts</h3>
        <p id="total-alerts" class="counter">0</p>
    </div>
    <div class="panel alert-panel">
        <h3>High Severity Alerts</h3>
        <p id="high-alerts" class="counter">0</p>
    </div>
    <div class="panel">
        <h3>Average Threat Score</h3>
        <p id="avg-threat" class="counter">0.0</p>
    </div>
</section>

<section class="charts-section">
    <div class="chart-container">
        <canvas id="eventsChart"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="alertsSeverityChart"></canvas>
    </div>
    <div class="chart-container">
        <canvas id="topAttackersChart"></canvas>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
{% endblock %}
