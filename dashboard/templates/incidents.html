{% extends "layout.html" %}

{% block title %}Incidents{% endblock %}
{% block header %}Incident Board{% endblock %}

{% block content %}
<section class="data-tables full-width">
    <div class="table-container">
        <h2>Confirmed Incidents <span class="badge" id="incident-count">0</span></h2>
        <table id="incidents-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Severity</th>
                    <th>Threat Score</th>
                    <th>MITRE Technique</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
{% endblock %}
